name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  id-token: write  # required for PyPI trusted publishing

jobs:
  # ── run checks before publishing ──────────────────────────────────────────
  checks:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: pytest
        run: uv run python -m pytest

  # ── build the sdist + wheel ────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── publish to PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "BatesPosture ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pip install batesposture==${{ steps.version.outputs.tag }}
            ```

            Then run:
            ```bash
            batesposture
            ```

            Or run without installing:
            ```bash
            pip install batesposture
            batesposture
            ```

            ---

            ### Requirements

            - Python 3.10 or newer
            - A webcam (built-in or USB)
            - Windows 10/11 (64-bit) or a modern Linux desktop (Ubuntu 20.04+, Fedora 35+, etc.)

            ### Windows note

            Grant camera permission when Windows prompts you. The app appears in your system tray (bottom-right, near the clock).

            ### Linux note

            GNOME users may need the [AppIndicator extension](https://extensions.gnome.org/extension/615/appindicator-support/) for system-tray support.
