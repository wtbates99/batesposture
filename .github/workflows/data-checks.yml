name: posture checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: Quality / Ubuntu / Python 3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Check PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: uv run python .github/workflows/title_check.py $(pwd) "$PR_TITLE"

  regression-tests:
    name: Regression / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # cv2 needs libGL; PyQt6 needs xcb/EGL even in offscreen mode.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxkbcommon-x11-0 libegl1

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Verify launch imports
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -c "import mediapipe as mp; assert mp.__version__ == '0.10.21'; print(f'mediapipe {mp.__version__}')"
          uv run python -c "import batesposture.main; print('batesposture.main OK')"
          uv run python -c "from batesposture.services.settings_service import ResourceSettings; path = ResourceSettings().icon_path.lower(); import os; assert path.endswith('.ico' if os.name == 'nt' else '.png'); print(path)"

      - name: Test database
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run python -m pytest -v --tb=long batesposture/tests/test_database.py

      - name: Test integration scoring
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -m pytest -v --tb=long \
            batesposture/tests/test_integration_pipeline.py::test_score_service_accumulates_scores \
            batesposture/tests/test_integration_pipeline.py::test_score_service_returns_zero_when_empty \
            batesposture/tests/test_integration_pipeline.py::test_settings_reload_propagates_threshold \
            batesposture/tests/test_integration_pipeline.py::test_settings_reload_resizes_buffer

      - name: Test integration notifications
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -m pytest -v --tb=long \
            batesposture/tests/test_integration_pipeline.py::test_notification_fires_below_threshold \
            batesposture/tests/test_integration_pipeline.py::test_notification_suppressed_above_threshold \
            batesposture/tests/test_integration_pipeline.py::test_notification_suppressed_during_cooldown \
            batesposture/tests/test_integration_pipeline.py::test_notification_fires_after_cooldown_expires

      - name: Test integration absence and concurrency
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -m pytest -v --tb=long \
            batesposture/tests/test_integration_pipeline.py::test_mark_absent_does_not_add_scores \
            batesposture/tests/test_integration_pipeline.py::test_mark_absent_breaks_streak \
            batesposture/tests/test_integration_pipeline.py::test_mark_absent_saves_best_streak \
            batesposture/tests/test_integration_pipeline.py::test_mark_absent_idempotent_when_no_streak \
            batesposture/tests/test_integration_pipeline.py::test_pause_session_excludes_absence_from_duration \
            batesposture/tests/test_integration_pipeline.py::test_score_service_thread_safety

      - name: Test integration dashboard history
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -m pytest -v --tb=long \
            batesposture/tests/test_integration_pipeline.py::test_dashboard_history_persists_and_reloads \
            batesposture/tests/test_integration_pipeline.py::test_dashboard_history_limit \
            batesposture/tests/test_integration_pipeline.py::test_dashboard_history_empty_db

      - name: Test launch and MediaPipe compatibility
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run python -m pytest -v --tb=long batesposture/tests/test_main.py batesposture/tests/test_mediapipe_compat.py

      - name: Test notifications and resources
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run python -m pytest -v --tb=long batesposture/tests/test_notification_service.py batesposture/tests/test_resource_settings.py batesposture/tests/test_send_notification.py

      - name: Test pose and score services
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run python -m pytest -v --tb=long batesposture/tests/test_pose_detector.py batesposture/tests/test_score_service.py

      - name: Test tray UI
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run python -m pytest -v --tb=long batesposture/tests/test_tray.py
